name: Build and deploy container to Azure Web App

on:
  push:
    branches:
      - master

env:
  AZURE_WEBAPP_NAME: TaskFlowWebApp
  ACR_NAME: taskflowcontainer
  ACR_LOGIN_SERVER: taskflowcontainer-anecgbhfa8cyfgha.azurecr.io
  IMAGE_NAME: taskflowwebapp
  RESOURCE_GROUP: TaskFlow

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name $ACR_NAME

      - name: Build Docker image
        run: docker build -t $ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }} -t $ACR_LOGIN_SERVER/$IMAGE_NAME:latest .

      - name: Push Docker image
        run: |
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }}
          docker push $ACR_LOGIN_SERVER/$IMAGE_NAME:latest

      - name: Configure Web App container
        run: |
          az webapp config container set \
            --name $AZURE_WEBAPP_NAME \
            --resource-group $RESOURCE_GROUP \
            --container-image-name $ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }}

      - name: Restart Web App
        run: az webapp restart --name $AZURE_WEBAPP_NAME --resource-group $RESOURCE_GROUP